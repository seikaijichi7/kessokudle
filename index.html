<!DOCTYPE html>
<html>
<head>
    <title>Kessoku Quiz & Mixer</title>
    <style>
        body { 
            /* The gradient acts as a backup while the image loads */
            background: radial-gradient(circle at top, #1e1e2e 0%, #11111b 100%); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out; /* Smooth fade when image changes */
            
            /* This semi-transparent overlay ensures text is ALWAYS readable */
            box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.7); 
            
            color: #cdd6f4; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 800px; margin: auto; }
        
        /* UI Elements */
        select, input[type=text] { 
            background: #1e1e1e; color: #ff4081; border: 2px solid #ff4081; 
            padding: 10px 20px; border-radius: 25px; font-size: 16px; outline: none;
        }
        canvas { 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255, 64, 129, 0.3); 
            width: 100%; 
            height: 180px; 
            border-radius: 15px; 
            margin: 20px 0; 
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 10px rgba(255, 64, 129, 0.1);
        }
        
        /* Mixer & Quiz Layout */
        .mixer { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .channel { 
            display: flex; align-items: center; background: #1e1e1e; 
            padding: 8px 20px; border-radius: 8px; width: 450px; justify-content: space-between; 
        }
        
        h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 64, 129, 0.5);
        }

        /* Buttons */
        button { 
            padding: 12px 25px; font-size: 16px; background: #ff4081; 
            color: white; border: none; border-radius: 50px; cursor: pointer; 
            font-weight: bold; margin: 5px; transition: 0.2s;
        }
        button:disabled { background: #444; cursor: not-allowed; }
        .quiz-btn { background: #00e676; color: #000; }
        .pause-btn { background: #ff9100; }

        #quiz-ui { background: #252525; padding: 20px; border-radius: 15px; margin-top: 20px; display: none; border: 2px dashed #ff4081; }
        .score-display { font-size: 24px; color: #00e676; margin: 10px 0; font-weight: bold; }
        .hidden { display: none !important; }


        .footer {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.7rem; /* Testo molto piccolo */
            color: #555; /* Colore scuro e discreto */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .seika-photo {
            width: 40px; /* Dimensioni della foto */
            height: 40px;
            border-radius: 50%; /* Foto circolare */
            border: 1px solid #555;
            object-fit: cover; /* Assicura che la foto si adatti al cerchio */
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="dev-panel" class="hidden" style="background: rgba(0,0,0,0.8); border: 1px solid #ff4081; padding: 10px; margin: 10px 0; border-radius: 10px; font-family: monospace; font-size: 14px; text-align: left;">
            <h3 style="margin: 0 0 10px 0; color: #ff4081; font-size: 16px;">DEV MODE: Timecodes</h3>
            <div id="dev-timecodes"></div>
            <div style="margin-top: 10px; color: #888;">AudioCtx Time: <span id="ctx-time">0.000</span>s</div>
        </div>
        <h1 id="mainTitle">Kessoku Band Mixer</h1>
        
        
        <div id="setup-controls">
            <select id="songSelect"><option>Loading tracks...</option></select>
            <button id="startBtn">PLAY MIXER</button>
            <button class="quiz-btn" id="quizModeBtn">START KESSOKUDLE</button>
        </div>
        
        <div id="playback-controls" class="hidden">
            <button class="pause-btn" id="pauseBtn">PAUSE</button>
            <button id="stopBtn">QUIT TO MENU</button>
        </div>
        
        <canvas id="visualizer"></canvas>
        
        <div id="quiz-ui">
            <div class="score-display">Score: <span id="scoreVal">0</span></div>
            <div id="attempts-display" style="font-size: 16px; color: #ff9100; margin-bottom: 10px; font-weight: bold;">Attempts: 5</div>
            
            <h2 id="quiz-status">Listen to the drums...</h2>
            <input type="text" id="guessInput" placeholder="Nome della canzone?">
            <button id="submitBtn" onclick="submitGuess()">SUBMIT</button>
            <div id="quiz-result" style="margin-top:15px; font-weight:bold;"></div>
            <button id="nextBtn" class="hidden" onclick="loadNextQuizSong()">NEXT SONG</button>
            <button id="restartBtn" class="hidden" onclick="location.reload()" style="background: #00e676; color: black;">PLAY AGAIN</button>
        </div>
        
        <div id="mixer-ui" class="mixer">
            <div class="channel"><span style="color:#ffd600">DRUMS</span><input type="range" id="vol-drums" min="0" max="1" step="0.01" value="1"></div>
            <div class="channel"><span style="color:#2979ff">BASS</span><input type="range" id="vol-bass" min="0" max="1" step="0.01" value="0"></div>
            <div class="channel"><span style="color:#ff5252">RHYTHM</span><input type="range" id="vol-rhythm" min="0" max="1" step="0.01" value="0"></div>
            <div class="channel"><span style="color:#ffa5c3">LEAD GTR</span><input type="range" id="vol-lead" min="0" max="1" step="0.01" value="0"></div>
            <div class="channel"><span style="color:#ff5252">VOCALS</span><input type="range" id="vol-vocals" min="0" max="1" step="0.01" value="0"></div>
        </div>

        <div class="status" id="loadStatus"></div>
    </div>

    <div class="footer">
        <img src="https://i.postimg.cc/9MQMgWJx/Seika-Ijichi.webp" alt="Seika Ijichi" class="seika-photo">
        <span>made with hate by Seika</span>
    </div>

    <script>
        let devModeActive = false;
        document.addEventListener('keydown', (e) => {
            // Premi CTRL + D per mostrare/nascondere le statistiche sviluppatore
            if (e.ctrlKey && e.key.toLowerCase() === 'd') {
                e.preventDefault();
                devModeActive = !devModeActive;
                const panel = document.getElementById('dev-panel');
                if (devModeActive) panel.classList.remove('hidden');
                else panel.classList.add('hidden');
            }
        });
        const bgImages = [
            "https://images2.alphacoders.com/129/1292065.png",
            "https://images8.alphacoders.com/129/thumb-1920-1295566.png",
            "https://w0.peakpx.com/wallpaper/284/605/HD-wallpaper-anime-bocchi-the-rock.jpg",
            "https://images.wallpapersden.com/image/download/bocchi-the-rock-4k-cool_bW5pbGeUmZqaraWkpJRobWllrWdma2U.jpg",
            "https://wallpapercave.com/wp/wp12156445.jpg"
        ];

        function setRandomBackground() {
            const randomImg = bgImages[Math.floor(Math.random() * bgImages.length)];
            document.body.style.backgroundImage = `url('${randomImg}')`;
        }

        // Call it immediately when the page loads
        setRandomBackground();

        let audioCtx, tracks = {}, isQuizMode = false, isPaused = false;
        let score = 0, currentSongIndex = 0, hintLevel = 0, songList = [];
        const stemIds = ['drums', 'bass', 'rhythm', 'lead', 'vocals'];
        let hasSubmitted = false;

        // Load Tracks from TXT
        async function loadTrackList() {
            const response = await fetch('tracks.txt');
            const text = await response.text();
            songList = text.split('\n').map(s => s.trim()).filter(s => s !== '');

            shuffleArray(songList);

            const select = document.getElementById('songSelect');
            const alphaList = [...songList].sort();
            select.innerHTML = songList.map(s => `<option value="${s}">${s}</option>`).join('');
        }
        loadTrackList();

        // Mode Switching
        document.getElementById('startBtn').onclick = () => startAudio(false);
        document.getElementById('quizModeBtn').onclick = () => startAudio(true);
        document.getElementById('stopBtn').onclick = () => location.reload();

        // Pause/Resume Logic
        document.getElementById('pauseBtn').onclick = function() {
            if (!audioCtx) return;
        
            if (isPaused) {
                audioCtx.resume();
                this.innerText = "PAUSE";
                this.style.background = "#ff9100";
                isPaused = false;
            } else {
                audioCtx.suspend();
                this.innerText = "RESUME";
                this.style.background = "#00e676";
                isPaused = true;
            }
        };

        async function startAudio(quiz) {
            isQuizMode = quiz;
            const titleElement = document.getElementById('mainTitle');
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            document.getElementById('setup-controls').classList.add('hidden');
            document.getElementById('playback-controls').classList.remove('hidden');
            
            if (quiz) {
                titleElement.innerText = "Kessokudle";
                document.getElementById('quiz-ui').style.display = 'block';
                document.getElementById('mixer-ui').classList.add('hidden');
                loadQuizSong();
            } else {
                titleElement.innerText = "Kessoku Band Mixer";
                initStems(document.getElementById('songSelect').value);
            }
            draw();
        }

        document.getElementById('guessInput').addEventListener('keyup', function (e) {
            if (e.key === 'Enter') {
                if (!hasSubmitted) {
                    submitGuess();
                } else {
                    // Check if the Next button is visible
                    const nextBtn = document.getElementById('nextBtn');
                    if (!nextBtn.classList.contains('hidden')) {
                        // We add a tiny delay so the UI has time to update 
                        // before the next song resets everything
                        setTimeout(() => {
                            loadNextQuizSong();
                        }, 100); 
                    }
                }
            }
        });

        async function initStems(songName) {
            const statusDiv = document.getElementById('loadStatus');
            statusDiv.innerHTML = "Caricamento tracce in corso... Attendi.";
        
            // 1. Ferma le tracce precedenti se esistono
            if (Object.keys(tracks).length > 0) {
                Object.values(tracks).forEach(t => {
                    if(t.source) t.source.stop(); 
                });
                tracks = {};
            }
        
            // 2. Prepara le promesse per scaricare tutti i file simultaneamente
            const loadPromises = stemIds.map(async (id) => {
                const fileName = id === 'lead' ? 'LEAD_GUITAR' : (id === 'rhythm' ? 'RHYTHM_GUITAR' : (id === 'vocals' ? 'LEAD_VOCALS' : id.toUpperCase()));
                const url = `${songName}/${fileName}.ogg`;
        
                try {
                    const response = await fetch(url);
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    return { id, buffer: audioBuffer };
                } catch (error) {
                    console.error(`Errore nel caricamento di ${url}:`, error);
                }
            });
        
            // 3. Aspetta che TUTTE le tracce siano scaricate e decodificate
            const loadedBuffers = await Promise.all(loadPromises);
        
            // 4. Configura i nodi audio e avviali tutti nello stesso esatto momento
            const startTime = audioCtx.currentTime + 0.1; // Aggiunge 100ms di margine per evitare glitch iniziali
        
            loadedBuffers.forEach((item) => {
                if (!item) return;
                
                const source = audioCtx.createBufferSource();
                source.buffer = item.buffer;
                source.loop = true; // Il loop sui buffer è perfetto al millisecondo
        
                const gainNode = audioCtx.createGain();
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64;
        
                // Logica del volume
                let vol = 0;
                if (!isQuizMode) vol = document.getElementById(`vol-${item.id}`).value;
                else if (item.id === 'drums') vol = 1;
        
                gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
                source.connect(gainNode).connect(analyser).connect(audioCtx.destination);
                
                tracks[item.id] = { source, gainNode, analyser };
        
                if (!isQuizMode) {
                    document.getElementById(`vol-${item.id}`).oninput = (e) => {
                        gainNode.gain.setTargetAtTime(parseFloat(e.target.value), audioCtx.currentTime, 0.02);
                    };
                }
        
                // Avvia la traccia
                source.start(startTime);
            });
        
            statusDiv.innerHTML = isQuizMode ? "Quiz in progress..." : `Playing: ${songName}`;
        }

        // QUIZ LOGIC

        let attemptsLeft = 5;

        function loadQuizSong() {
            hasSubmitted = false; 
            attemptsLeft = 5; // Reset
            hintLevel = 0;    // 0 = Drums, 1 = Bass, 2 = Rhythm, 3 = Lead, 4 = Vocals
            
            document.getElementById('submitBtn').disabled = false; 
            document.getElementById('quiz-result').innerText = "";
            document.getElementById('guessInput').value = "";
            document.getElementById('guessInput').disabled = false;
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('restartBtn').classList.add('hidden');
            
            document.getElementById('attempts-display').innerText = `Attempts: ${attemptsLeft}`;
            document.getElementById('quiz-status').innerText = `Song ${currentSongIndex + 1} of ${songList.length}: Listen to the drums...`;
            
            initStems(songList[currentSongIndex]);
            document.getElementById('guessInput').focus();
        }


        function submitGuess() {
            if (hasSubmitted) return; 

            const guess = document.getElementById('guessInput').value.trim().toLowerCase();
            const answer = songList[currentSongIndex].toLowerCase();
            const resultDiv = document.getElementById('quiz-result');
            const submitBtn = document.getElementById('submitBtn');
            
            const dist = levenshtein(guess, answer);

            // Vittoria: Risposta corretta (entro la tolleranza Levenshtein)
            if (dist <= 5) {
                hasSubmitted = true;
                submitBtn.disabled = true;
                document.getElementById('guessInput').disabled = true;
                
                // Assegna i punti in base a quanti tentativi sono rimasti
                const points = attemptsLeft; 
                score += points;
                document.getElementById('scoreVal').innerText = score;
                
                resultDiv.innerHTML = `<span style="color:#00e676">CORRECT! (+${points} points)</span>`;
                
                // Rivela TUTTI gli strumenti per festeggiare
                stemIds.forEach(id => tracks[id].gainNode.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5));
                
                MostraPulsanteSuccessivo();
            } 
            // Errore: Risposta sbagliata
            else {
                attemptsLeft--;
                document.getElementById('attempts-display').innerText = `Attempts: ${attemptsLeft}`;
                document.getElementById('guessInput').value = ""; // Svuota l'input per il prossimo tentativo
                
                if (attemptsLeft > 0) {
                    // Sblocca lo strumento successivo come penalità/aiuto
                    hintLevel++;
                    const nextInstrument = stemIds[hintLevel];
                    tracks[nextInstrument].gainNode.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5);
                    
                    resultDiv.innerHTML = `<span style="color:#ff9100">Wrong. Added instrument: ${nextInstrument.toUpperCase()}</span>`;
                    document.getElementById('quiz-status').innerText = `Listen to the ${nextInstrument.toUpperCase()}`;
                } 
                // Sconfitta: Finiti i tentativi per questa canzone
                else {
                    hasSubmitted = true;
                    submitBtn.disabled = true;
                    document.getElementById('guessInput').disabled = true;
                    
                    resultDiv.innerHTML = `<span style="color:#ff5252">Incorrect. It was: ${songList[currentSongIndex]}</span>`;
                    
                    // Rivela comunque tutto l'audio alla fine
                    stemIds.forEach(id => tracks[id].gainNode.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5));
                    
                    MostraPulsanteSuccessivo();
                }
            }
        }

        // Funzione di controllo per decidere se mostrare "Prossima Canzone" o "Riavvia Gioco"
        function MostraPulsanteSuccessivo() {
            if (currentSongIndex + 1 < songList.length) {
                document.getElementById('nextBtn').classList.remove('hidden');
            } else {
                document.getElementById('quiz-status').innerText = "Quiz Completed!";
                document.getElementById('quiz-result').innerHTML += `<br><span style="color:#ffa5c3; font-size:20px;">Final Score: ${score}</span>`;
                document.getElementById('restartBtn').classList.remove('hidden');
            }
        }
        
        function loadNextQuizSong() {
            currentSongIndex++;
            if (currentSongIndex < songList.length) {
                loadQuizSong();
            }
        }

        // Fuzzy Matching Algorithm
        function levenshtein(a, b) {
            const tmp = [];
            for (let i = 0; i <= a.length; i++) { tmp[i] = [i]; }
            for (let j = 0; j <= b.length; j++) { tmp[0][j] = j; }
            for (let i = 1; i <= a.length; i++) {
                for (let j = 1; j <= b.length; j++) {
                    tmp[i][j] = Math.min(tmp[i - 1][j] + 1, tmp[i][j - 1] + 1, tmp[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
                }
            }
            return tmp[a.length][b.length];
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        function draw() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            requestAnimationFrame(draw);
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const ids = Object.keys(tracks);
            const barWidth = canvas.width / ids.length;
            ids.forEach((id, i) => {
                const data = new Uint8Array(tracks[id].analyser.frequencyBinCount);
                tracks[id].analyser.getByteFrequencyData(data);
                const avg = data.reduce((a, b) => a + b, 0) / data.length;
                const h = (avg / 255) * canvas.height;
                ctx.fillStyle = (id === 'drums') ? '#ffd600' : (id === 'bass') ? '#2979ff' :  (id === 'lead') ? '#ff80ab' :'#ff5252';
                ctx.fillRect(i * barWidth + 10, canvas.height - h, barWidth - 20, h);
            if (devModeActive && audioCtx) {
                document.getElementById('ctx-time').innerText = audioCtx.currentTime.toFixed(3);
                
                let timecodesHTML = '';
                Object.keys(tracks).forEach(id => {
                    // Nota: con il nuovo metodo Buffer, la traccia non ha un .currentTime proprio,
                    // è tutto sincronizzato all'audioCtx. Se volessi tracciare il tempo del loop esatto, 
                    // facciamo il modulo del tempo attuale diviso la durata della traccia.
                    const buffer = tracks[id].source.buffer;
                    if(buffer) {
                        const duration = buffer.duration;
                        // Calcola il punto esatto in cui si trova il loop corrente
                        const currentLoopTime = (audioCtx.currentTime % duration).toFixed(3);
                        timecodesHTML += `<div style="color: white; margin-bottom: 2px;">
                            <span style="color:#ff4081">[${id.toUpperCase()}]</span> Loop Time: ${currentLoopTime}s / ${duration.toFixed(3)}s
                        </div>`;
                    }
                });
                document.getElementById('dev-timecodes').innerHTML = timecodesHTML;
            }
            });
        }
    </script>
</body>
</html>
